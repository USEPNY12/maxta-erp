<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="description" content="MaxTA Glass Fabrication ERP - Manufacturing, Sales, Inventory, Accounting" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MaxTA ERP" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
  <title>Max TA Group - Glass ERP</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #root:empty::after {
      content: '';
      display: block;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
      z-index: 9999;
    }
    #root:empty::before {
      content: 'Max TA Group ERP';
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      color: #fff;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
      z-index: 10000;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-to-content">Skip to main content</a>
  <div id="root"></div>
  <script>
    if("serviceWorker" in navigator){navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(reg){reg.unregister()})});}
    if("caches" in window){caches.keys().then(function(n){n.forEach(function(name){caches.delete(name)})});}
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
