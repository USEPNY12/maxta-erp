version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: maxta-erp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: MaxTA_Root_2026!
      MYSQL_DATABASE: maxta_erp
      MYSQL_USER: maxta_erp
      MYSQL_PASSWORD: MaxTA_ERP_2026!
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: maxta-erp-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: maxta_erp
      DB_PASSWORD: MaxTA_ERP_2026!
      DB_NAME: maxta_erp
      JWT_SECRET: maxta_erp_jwt_secret_2026_glass_fabrication
      JWT_EXPIRES_IN: 24h
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: maxta-erp-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data:
